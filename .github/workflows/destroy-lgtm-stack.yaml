name: Destroy LGTM Stack

on:
  workflow_dispatch:
    inputs:
      cloud_provider:
        description: 'Cloud Provider'
        required: true
        type: choice
        options:
          - gke
          - eks
          - generic
        default: 'gke'
      destroy_storage:
        description: 'Delete storage buckets/volumes'
        required: true
        type: boolean
        default: false
      confirm_destroy:
        description: 'Type "DESTROY" to confirm'
        required: true
        type: string

env:
  TERRAFORM_VERSION: '1.6.0'
  KUBECTL_VERSION: '1.28.0'
  WORKING_DIR: 'lgtm-stack/terraform'

jobs:
  validate-confirmation:
    name: Validate Destroy Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation input
        run: |
          if [ "${{ inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "❌ Destroy confirmation failed. You must type 'DESTROY' to proceed."
            exit 1
          fi
          echo "✅ Destroy confirmation validated"

  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs: validate-confirmation
    environment:
      name: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Setup Cloud Credentials - GKE
        if: inputs.cloud_provider == 'gke'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Compute Environment - GKE
        if: inputs.cloud_provider == 'gke'
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Cloud Credentials - EKS
        if: inputs.cloud_provider == 'eks'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}



      - name: Setup kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          
          # Get GKE credentials
          if [ "${{ inputs.cloud_provider }}" == "gke" ]; then
            gcloud container clusters get-credentials ${{ secrets.CLUSTER_NAME }} \
              --region=${{ secrets.CLUSTER_LOCATION }} \
              --project=${{ secrets.GCP_PROJECT_ID }}
          fi

      - name: Configure backend
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          bash ../../.github/scripts/configure-backend.sh "${{ inputs.cloud_provider }}"
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          AZURE_STORAGE_CONTAINER: ${{ secrets.AZURE_STORAGE_CONTAINER }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Remove Grafana and Keycloak resources from state
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "🗑️ Removing Grafana and Keycloak resources from Terraform state..."
          
          # Remove all Grafana provider resources from state
          terraform state list | grep -E '^grafana_' | while read -r resource; do
            echo "  Removing: $resource"
            terraform state rm "$resource" || true
          done
          
          # Remove all Keycloak provider resources from state
          terraform state list | grep -E '^keycloak_' | while read -r resource; do
            echo "  Removing: $resource"
            terraform state rm "$resource" || true
          done
          
          echo "✅ Grafana and Keycloak resources removed from state"

      - name: Pre-destroy cleanup - Remove stuck resources
        run: |
          echo "🧹 Cleaning up stuck resources before Terraform destroy..."
          
          # Delete stuck Grafana pods
          kubectl delete pod -n observability -l app.kubernetes.io/name=grafana --force --grace-period=0 || true
          
          # Delete grafana-team-sync CronJob and Jobs
          kubectl delete cronjob -n observability grafana-team-sync || true
          kubectl delete jobs -n observability -l app=grafana-team-sync || true
          
          # Delete Grafana Helm release entirely
          helm uninstall monitoring-grafana -n observability || true
          
          # Remove finalizers from stuck resources
          kubectl patch helmrelease -n observability monitoring-grafana -p '{"metadata":{"finalizers":[]}}' --type=merge || true
          
          echo "✅ Pre-cleanup complete"

      - name: Get GKE Cluster Info
        if: inputs.cloud_provider == 'gke'
        id: cluster_info
        run: |
          ENDPOINT=$(gcloud container clusters describe ${{ secrets.CLUSTER_NAME }} --region=${{ secrets.CLUSTER_LOCATION }} --project=${{ secrets.GCP_PROJECT_ID }} --format='value(endpoint)')
          CA_CERT=$(gcloud container clusters describe ${{ secrets.CLUSTER_NAME }} --region=${{ secrets.CLUSTER_LOCATION }} --project=${{ secrets.GCP_PROJECT_ID }} --format='value(masterAuth.clusterCaCertificate)')
          echo "endpoint=$ENDPOINT" >> $GITHUB_OUTPUT
          echo "ca_cert=$CA_CERT" >> $GITHUB_OUTPUT

      - name: Terraform Destroy
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          # Destroy without initializing Grafana/Keycloak providers
          # by providing dummy values and using -refresh=false
          terraform destroy -auto-approve -refresh=false \
            -var="cloud_provider=${{ inputs.cloud_provider }}" \
            -var="environment=${{ secrets.ENVIRONMENT }}" \
            -var="monitoring_domain=${{ secrets.MONITORING_DOMAIN }}" \
            -var="letsencrypt_email=${{ secrets.LETSENCRYPT_EMAIL }}" \
            -var="grafana_admin_password=dummy-password" \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="cluster_name=${{ secrets.CLUSTER_NAME }}" \
            -var="cluster_location=${{ secrets.CLUSTER_LOCATION }}" \
            -var="region=${{ secrets.REGION }}" \
            -var="force_destroy=${{ inputs.destroy_storage }}" \
            -var="gke_endpoint=${{ steps.cluster_info.outputs.endpoint || '' }}" \
            -var="gke_ca_certificate=${{ steps.cluster_info.outputs.ca_cert || '' }}" \
            -var="keycloak_url=https://dummy-keycloak.example.com" \
            -var="keycloak_realm=dummy-realm" \
            -var="keycloak_admin_user=dummy-user" \
            -var="keycloak_admin_password=dummy-password" \
            -var="grafana_keycloak_user=dummy-user" \
            -var="grafana_keycloak_email=dummy@example.com" \
            -var="grafana_keycloak_password=dummy-password" \
            -var="grafana_url=https://dummy-grafana.example.com"


      - name: Clean up storage buckets - GKE
        if: inputs.cloud_provider == 'gke' && inputs.destroy_storage == true
        run: |
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          for bucket in loki-chunks loki-ruler mimir-blocks mimir-ruler tempo-traces; do
            BUCKET_NAME="${PROJECT_ID}-${bucket}-v1"
            echo "🗑️ Deleting bucket: $BUCKET_NAME"
            gsutil -m rm -r "gs://${BUCKET_NAME}" || true
          done

      - name: Post-destroy cleanup - Remove namespace and PVCs
        run: |
          echo "🧹 Final cleanup..."
          
          # Delete all PVCs in observability namespace
          kubectl delete pvc -n observability --all --force --grace-period=0 || true
          
          # Delete the namespace (will cascade delete everything)
          kubectl delete namespace observability --force --grace-period=0 || true
          
          # Wait for namespace deletion
          kubectl wait --for=delete namespace/observability --timeout=120s || true
          
          echo "✅ Namespace and PVCs cleaned up"

      - name: Clean up storage buckets - EKS
        if: inputs.cloud_provider == 'eks' && inputs.destroy_storage == true
        run: |
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          for bucket in loki-chunks loki-ruler mimir-blocks mimir-ruler tempo-traces; do
            BUCKET_NAME="${PROJECT_ID}-${bucket}-v1"
            echo "🗑️ Deleting S3 bucket: $BUCKET_NAME"
            aws s3 rb "s3://${BUCKET_NAME}" --force || true
          done



      - name: Verify cleanup
        run: |
          echo "📊 Remaining resources in observability namespace:"
          kubectl get all -n observability || echo "Namespace not found (expected)"
          echo "✅ Destroy complete"
