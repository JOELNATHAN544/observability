apiVersion: v1
kind: Namespace
metadata:
  name: demo-apps
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-generator
  namespace: demo-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-gen
  template:
    metadata:
      labels:
        app: demo-gen
    spec:
      containers:
      - name: generator
        image: python:3.11-slim
        command: ["/bin/sh", "-c"]
        args:
          - |
            pip install prometheus_client --quiet
            python -c "
            import time
            import random
            import logging
            from prometheus_client import start_http_server, Counter

            logging.basicConfig(level=logging.INFO, format='%(message)s')
            REQUESTS = Counter('demo_app_requests_total', 'Total requests', ['method', 'endpoint'])

            start_http_server(8080)
            print('Starting demo generator...')
            while True:
                method = random.choice(['GET', 'POST'])
                endpoint = random.choice(['/api/v1', '/health', '/data'])
                REQUESTS.labels(method=method, endpoint=endpoint).inc()
                logging.info(f'DEMO_LOG: {method} {endpoint} processed successfully')
                time.sleep(2)
            "
        ports:
        - containerPort: 8080
          name: metrics
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-alloy-config
  namespace: demo-apps
data:
  config.alloy: |
    loki.write "test_tenant" {
      endpoint {
        url = "http://monitoring-loki-gateway.observability.svc.cluster.local/loki/api/v1/push"
        headers = {
          "X-Scope-OrgID" = "test",
        }
      }
    }

    prometheus.remote_write "test_tenant" {
      endpoint {
        url = "http://monitoring-mimir-nginx.observability.svc.cluster.local/api/v1/push"
        headers = {
          "X-Scope-OrgID" = "test",
        }
      }
    }

    otelcol.exporter.otlp "test_tenant" {
      client {
        endpoint = "monitoring-tempo-distributor.observability.svc.cluster.local:4317"
        tls {
          insecure             = true
          insecure_skip_verify = true
        }
        headers = {
          "X-Scope-OrgID" = "test",
        }
      }
    }

    otelcol.receiver.otlp "default" {
      grpc {}
      http {}
      output {
        traces  = [otelcol.exporter.otlp.test_tenant.input]
      }
    }

    discovery.kubernetes "pods" {
      role = "pod"
      namespaces {
        names = ["demo-apps"]
      }
    }

    discovery.relabel "demo_gen" {
      targets = discovery.kubernetes.pods.targets
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        regex         = "demo-gen"
        action        = "keep"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_port_number"]
        regex         = "8080"
        action        = "keep"
      }
    }

    // Static target to test Mimir connectivity
    prometheus.scrape "alloy_self" {
      targets    = [{"__address__" = "localhost:12345"}]
      forward_to = [prometheus.remote_write.test_tenant.receiver]
    }

    loki.source.kubernetes "demo_logs" {
      targets    = discovery.relabel.demo_gen.output
      forward_to = [loki.write.test_tenant.receiver]
    }

    prometheus.scrape "demo_metrics" {
      targets    = discovery.relabel.demo_gen.output
      forward_to = [prometheus.remote_write.test_tenant.receiver]
    }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-alloy-sa
  namespace: demo-apps
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: demo-alloy-role
  namespace: demo-apps
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints", "pods/log", "namespaces"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-alloy-rb
  namespace: demo-apps
subjects:
- kind: ServiceAccount
  name: demo-alloy-sa
  namespace: demo-apps
roleRef:
  kind: Role
  name: demo-alloy-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: demo-alloy-agent
  namespace: demo-apps
spec:
  selector:
    matchLabels:
      app: demo-alloy
  template:
    metadata:
      labels:
        app: demo-alloy
    spec:
      serviceAccountName: demo-alloy-sa
      containers:
        - name: alloy
          image: grafana/alloy:v1.8.0
          args:
            - run
            - /etc/alloy/config.alloy
            - --stability.level=experimental
            - --storage.path=/var/lib/alloy/data
          volumeMounts:
            - name: alloy-config
              mountPath: /etc/alloy
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: alloy-data
              mountPath: /var/lib/alloy/data
      volumes:
        - name: alloy-config
          configMap:
            name: demo-alloy-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: alloy-data
          emptyDir: {}
